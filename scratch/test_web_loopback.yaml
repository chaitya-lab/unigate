# Unigate Config with Web only (loopback routing test)
unigate:
  mount_prefix: /unigate

storage:
  backend: memory

instances:
  web1:
    type: webui
    name: web1

  web2:
    type: webui
    name: web2

routing:
  default_action: keep
  rules:
    - name: web1-to-web2
      priority: 100
      match:
        from_instance: web1
      actions:
        forward_to: [web2]
    
    - name: web2-to-web1
      priority: 100
      match:
        from_instance: web2
      actions:
        forward_to: [web1]
